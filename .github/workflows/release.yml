name: Release

# Build, sign, and publish a macOS release when a version tag is pushed.
# Produces both a .dmg (for first-time manual download) and the updater
# artifacts (.app.tar.gz + .sig + latest.json) that the in-app auto-updater
# consumes. The updater endpoint points at this release's latest.json.
#
# Repo: github.com/AuricX/Markdown-Kit
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           contents of ~/.tauri/markdown-kit.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key password (empty string if none)
#   HOMEBREW_TAP_TOKEN                  PAT with Contents:write on AuricX/homebrew-tap
#                                       (only needed for the update-cask job)
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Markdown Kit ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          # Universal binary → one .dmg + one .app.tar.gz for Intel and Apple Silicon.
          args: --target universal-apple-darwin

  # Bump the Homebrew cask (version + sha256) in AuricX/homebrew-tap to point at
  # the release just published. Skipped automatically if HOMEBREW_TAP_TOKEN is unset.
  update-cask:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update cask in tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping cask update."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="Markdown.Kit_${VERSION}_universal.dmg"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${DMG}"
          echo "Fetching $URL"
          curl -fsSL -o "$DMG" "$URL"
          SHA="$(sha256sum "$DMG" | cut -d' ' -f1)"
          echo "sha256=$SHA"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/AuricX/homebrew-tap.git" tap
          cd tap
          sed -i -E "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/markdown-kit.rb
          sed -i -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/markdown-kit.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Update markdown-kit to ${VERSION}"
          git push
