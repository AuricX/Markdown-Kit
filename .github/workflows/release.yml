name: Release

# Build, sign, and publish a macOS release when a version tag is pushed.
# Produces both a .dmg (for first-time manual download) and the updater
# artifacts (.app.tar.gz + .sig + latest.json) that the in-app auto-updater
# consumes. The updater endpoint points at this release's latest.json.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           contents of ~/.tauri/markdown-kit.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key password (empty string if none)
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Markdown Kit ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          # Universal binary → one .dmg + one .app.tar.gz for Intel and Apple Silicon.
          args: --target universal-apple-darwin
